name: Pre-Match Briefings (WC, T-45)

# Lineup-aware AI briefings ~45 min before each World Cup kickoff.
# Runs every 15 min during plausible WC kickoff hours (NA host timezones span
# ~16:00-04:00 UTC). The job is cheap when idle: it spins up, finds no fixture
# in the T-45 window, and exits. A per-day cache prevents double-posting.
#
# Disable (comment out the schedule) once the tournament ends.

on:
  schedule:
    - cron: '*/15 15-23,0-4 * * *'
  workflow_dispatch:
    inputs:
      window:
        description: 'Minutes before kickoff to brief'
        required: false
        default: '45'

jobs:
  prematch-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      MODEL_HMAC_KEY: ${{ secrets.MODEL_HMAC_KEY }}
      BETTING_AGENT_ALLOW_DEFAULT_HMAC: '1'
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Restore ML models cache
        uses: actions/cache/restore@v5
        with:
          path: |
            data/models/
            data/historical_load_cache.json
          key: betting-models-${{ github.run_number }}
          restore-keys: |
            betting-models-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        env:
          NODE_NO_WARNINGS: 1
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip uninstall -y nvidia-nccl-cu12 2>/dev/null || true

      - name: Create config from example
        run: cp config/config.example.yaml config/config.yaml

      - name: Mark DB tables as created
        run: echo "TABLES_CREATED=1" >> $GITHUB_ENV

      - name: Restore briefings-sent guard
        uses: actions/cache/restore@v5
        with:
          path: data/briefings_sent.json
          key: briefings-sent-${{ github.run_id }}
          restore-keys: |
            briefings-sent-

      - name: Post lineup-aware pre-match briefings (T-45)
        run: python -m src.agent.betting_agent --prematch-briefing ${{ github.event.inputs.window || '45' }}
        timeout-minutes: 20
        continue-on-error: true

      - name: Save briefings-sent guard
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/briefings_sent.json
          key: briefings-sent-${{ github.run_id }}
