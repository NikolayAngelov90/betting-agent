name: Daily Betting Picks

on:
  schedule:
    # Runs at 11:00 UTC = 13:00 Kyiv/Helsinki (UTC+2)
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  daily-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Restore database and models
        uses: actions/cache@v4
        with:
          path: |
            data/football_betting.db
            data/models/
          key: betting-data-${{ github.run_number }}
          restore-keys: |
            betting-data-

      - name: Create directories
        run: mkdir -p data/models logs

      - name: Run daily update
        run: python -m src.agent.betting_agent --update

      - name: Settle yesterday's predictions
        run: python -m src.agent.betting_agent --settle
        continue-on-error: true

      - name: Generate and send picks
        run: python -m src.agent.betting_agent --picks

      - name: Save database and models
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/football_betting.db
            data/models/
          key: betting-data-${{ github.run_number }}
