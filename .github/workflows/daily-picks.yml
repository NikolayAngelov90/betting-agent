name: Daily Betting Picks

on:
  schedule:
    # WC 2026 timing (from the full FIFA schedule via football-data.org):
    # earliest first kickoff of any NA match day is 16:00 UTC / 19:00 Sofia
    # (Jun 15/18/21, Jul 1/7). Requirement: pipeline DONE >=1h before first KO
    # with ~1h runtime => must START by 14:00 UTC. GitHub's scheduler has
    # delayed this repo's cron by 0.5-5.7h (observed), hence the early primary
    # plus a backup. All steps are idempotent (picks dedup by match+selection,
    # briefings sent-guard), so the backup is a cheap no-op when the primary
    # already succeeded. Off-hour minutes dodge top-of-hour congestion.
    - cron: '37 9 * * *'   # primary — 09:37 UTC (12:37 Sofia)
    - cron: '23 12 * * *'  # backup  — 12:23 UTC (15:23 Sofia)
  workflow_dispatch: # Allow manual trigger
    inputs:
      backfill_wc:
        description: 'Run national-team history backfill (WC/qualifiers/friendlies) before the pipeline'
        required: false
        default: 'false'

# Never let a delayed primary and the backup write to the DB at the same time —
# the second run queues until the first finishes.
concurrency:
  group: daily-picks
  cancel-in-progress: false

jobs:
  daily-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      # Claude Pro subscription auth for briefings (claude_code backend, $0 extra).
      # Generate locally with `claude setup-token`.
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      # Use the secret when configured; otherwise fall back to the explicit
      # dev opt-in so existing CI runs don't break before the secret is added.
      MODEL_HMAC_KEY: ${{ secrets.MODEL_HMAC_KEY }}
      BETTING_AGENT_ALLOW_DEFAULT_HMAC: '1'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONIOENCODING: utf-8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Restore ML models cache
        uses: actions/cache/restore@v5
        with:
          path: |
            data/models/
            data/historical_load_cache.json
          key: betting-models-${{ github.run_number }}
          restore-keys: |
            betting-models-

      - name: Restore camoufox binary cache
        id: restore-camoufox
        uses: actions/cache/restore@v5
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            camoufox-${{ runner.os }}-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        env:
          NODE_NO_WARNINGS: 1
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome (stable) and Xvfb
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb xvfb
          google-chrome --version

      - name: Start virtual display (Xvfb)
        run: |
          Xvfb :99 -screen 0 1920x1080x24 -ac 2>/dev/null &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 1
          echo "Virtual display started on :99"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # Remove GPU libraries pulled as XGBoost transitive deps on CPU-only runner
          pip uninstall -y nvidia-nccl-cu12 2>/dev/null || true
          python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Download camoufox Firefox binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m camoufox fetch
        continue-on-error: true

      - name: Create directories
        run: mkdir -p data/models logs

      - name: Create config from example
        run: cp config/config.example.yaml config/config.yaml

      - name: Verify database connection
        run: |
          python -c "
          from src.data.database import init_db
          db = init_db()
          assert db.health_check(), 'Database health check failed'
          print('Database connection OK (PostgreSQL/Neon)')
          "

      - name: Mark DB tables as created
        run: echo "TABLES_CREATED=1" >> $GITHUB_ENV

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: true

      - name: Check national-team data coverage
        id: natcov
        run: |
          LOW=$(python -c "
          from datetime import datetime, timedelta
          from sqlalchemy import or_
          from src.data.database import get_db
          from src.data.models import Match
          from src.models.poisson_model import NATIONAL_TEAM_LEAGUES
          db = get_db()
          nat = list(NATIONAL_TEAM_LEAGUES)
          with db.get_session() as s:
              n = s.query(Match).filter(
                  Match.league.in_(nat), Match.home_goals.isnot(None),
              ).count()
              # Aggregate count alone missed USA having ZERO matches while the
              # total passed 1500 — also check every team playing in the next
              # 48h for missing history.
              now = datetime.utcnow()
              fixtures = s.query(Match).filter(
                  Match.league == 'world/fifa-world-cup',
                  Match.is_fixture == True,
                  Match.match_date >= now,
                  Match.match_date <= now + timedelta(hours=48),
              ).all()
              bare = 0
              for f in fixtures:
                  for tid in (f.home_team_id, f.away_team_id):
                      played = s.query(Match).filter(
                          Match.league.in_(nat), Match.home_goals.isnot(None),
                          or_(Match.home_team_id == tid, Match.away_team_id == tid),
                      ).count()
                      if played == 0:
                          bare += 1
          print('true' if (n < 1500 or bare > 0) else 'false')" | tail -1)
          echo "low=$LOW" >> "$GITHUB_OUTPUT"
          echo "National-team coverage low: $LOW"

      - name: Backfill national-team history (auto when coverage low, or on demand)
        if: github.event.inputs.backfill_wc == 'true' || steps.natcov.outputs.low == 'true'
        run: python -m src.agent.betting_agent --backfill-wc
        # Supabase insert latency makes big seasons slow (~20 min per ~400
        # matches); 40 min was hit mid-list on 2026-06-12. Targets are ordered
        # most-recent-first so even a timeout keeps the valuable data.
        timeout-minutes: 90
        continue-on-error: true

      - name: Run daily update (fixtures + odds, no Flashscore results)
        id: update
        run: python -m src.agent.betting_agent --update --skip-ml-retrain
        timeout-minutes: 65
        continue-on-error: true

      - name: Settle yesterday's predictions
        id: settle1
        run: python -m src.agent.betting_agent --settle
        timeout-minutes: 15
        continue-on-error: true

      - name: Retrain ML models (if stale)
        id: retrain_ml
        run: python -m src.agent.betting_agent --train
        timeout-minutes: 50
        continue-on-error: true

      - name: Alert on ML training timeout or failure
        if: always() && steps.retrain_ml.outcome != 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python - <<'EOF'
          import os, urllib.request, json
          token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
          chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
          if token and chat_id:
              msg = "\u26a0\ufe0f ML training step killed by CI timeout \u2014 model not updated. Raise timeout-minutes or reduce sample target."
              url = f"https://api.telegram.org/bot{token}/sendMessage"
              data = json.dumps({"chat_id": chat_id, "text": msg}).encode()
              try:
                  urllib.request.urlopen(url, data=data, timeout=10)
              except Exception as e:
                  print(f"Telegram alert failed: {e}")
          EOF

      - name: Check DB health
        run: |
          python << 'PYEOF'
          from src.data.database import get_db
          from src.data.models import Match, SavedPick
          db = get_db()
          with db.get_session() as session:
              completed = session.query(Match).filter(Match.home_goals.isnot(None)).count()
              fixtures = session.query(Match).filter(Match.is_fixture == True).count()
              picks = session.query(SavedPick).count()
              pending = session.query(SavedPick).filter(SavedPick.result.is_(None)).count()
          print(f'DB health: {completed} completed matches | {fixtures} fixtures | {picks} total picks ({pending} pending)')
          if completed < 100:
              print('WARNING: fewer than 100 completed matches — ML training may be skipped')
          PYEOF

      # Restore BEFORE picks: get_daily_picks reads the final:<match_id> freeze
      # markers from this file — restoring after picks let a second run
      # regenerate picks behind briefing decisions (only dedup caught it).
      - name: Restore briefings-sent guard
        uses: actions/cache/restore@v5
        with:
          path: data/briefings_sent.json
          key: briefings-sent-${{ github.run_id }}
          restore-keys: |
            briefings-sent-

      - name: Generate and send picks
        id: picks
        run: python -m src.agent.betting_agent --picks --force
        timeout-minutes: 60
        continue-on-error: true

      - name: Install Claude Code CLI (briefings via Pro subscription)
        run: npm install -g @anthropic-ai/claude-code
        continue-on-error: true

      - name: Post AI preview briefings (WC matches, no lineups)
        id: briefing
        run: python -m src.agent.betting_agent --briefing
        timeout-minutes: 60
        continue-on-error: true

      - name: Save briefings-sent guard
        if: always()
        uses: actions/cache/save@v5
        with:
          path: data/briefings_sent.json
          key: briefings-sent-${{ github.run_id }}

      - name: Scrape Flashscore results for all leagues (post-picks)
        id: results
        if: always()
        run: python -m src.agent.betting_agent --update-results
        timeout-minutes: 60
        continue-on-error: true

      - name: Settle late results (post update-results)
        id: settle2
        if: always()
        run: python -m src.agent.betting_agent --settle
        timeout-minutes: 15
        continue-on-error: true

      # Loud failure alert: every core step above runs with continue-on-error so
      # the pipeline never half-aborts, but that also keeps the JOB green on a
      # crash — a silent no-pick / no-briefing day. This step inspects each step's
      # outcome and sends ONE Telegram alert if any critical step failed, so a
      # real crash is never invisible.
      - name: Alert on critical step failure
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          O_UPDATE: ${{ steps.update.outcome }}
          O_SETTLE1: ${{ steps.settle1.outcome }}
          O_PICKS: ${{ steps.picks.outcome }}
          O_BRIEFING: ${{ steps.briefing.outcome }}
          O_RESULTS: ${{ steps.results.outcome }}
          O_SETTLE2: ${{ steps.settle2.outcome }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python - <<'EOF'
          import os, urllib.request, json
          steps = {
              "update": os.environ.get("O_UPDATE", ""),
              "settle (pre-picks)": os.environ.get("O_SETTLE1", ""),
              "picks": os.environ.get("O_PICKS", ""),
              "briefing": os.environ.get("O_BRIEFING", ""),
              "update-results": os.environ.get("O_RESULTS", ""),
              "settle (post-results)": os.environ.get("O_SETTLE2", ""),
          }
          # outcome is 'success', 'failure', 'skipped', or '' (never ran)
          failed = [n for n, o in steps.items() if o == "failure"]
          if not failed:
              print("All critical steps OK:", steps)
          else:
              token = os.environ.get("TELEGRAM_BOT_TOKEN", "")
              chat_id = os.environ.get("TELEGRAM_CHAT_ID", "")
              run_url = os.environ.get("RUN_URL", "")
              msg = ("⚠️ Daily picks: step(s) FAILED — "
                     + ", ".join(failed)
                     + f"\nThe run stayed green (continue-on-error). Logs: {run_url}")
              print(msg)
              if token and chat_id:
                  data = json.dumps({"chat_id": chat_id, "text": msg}).encode()
                  try:
                      urllib.request.urlopen(
                          f"https://api.telegram.org/bot{token}/sendMessage",
                          data=data, timeout=10,
                      )
                  except Exception as e:
                      print(f"Telegram alert failed: {e}")
          EOF

      - name: Send weekly performance report (Sundays only)
        if: always()
        run: |
          if [ "$(date +%w)" = "0" ]; then
            echo "Sunday — sending weekly performance report"
            python -m src.agent.betting_agent --report --no-settle
          else
            echo "Not Sunday (day=$(date +%w)) — skipping weekly report"
          fi
        continue-on-error: true

      - name: Save ML models cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: |
            data/models/
            data/historical_load_cache.json
          key: betting-models-${{ github.run_number }}

      - name: Save camoufox binary cache
        if: always() && steps.restore-camoufox.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ~/.cache/camoufox
          key: camoufox-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: Notify Telegram on failure
        if: failure()
        run: |
          python << 'PYEOF'
          import os, urllib.request, json
          token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')
          if token and chat_id:
              run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              msg = f'Daily picks workflow FAILED (run #${{ github.run_number }})\nLogs: {run_url}'
              data = json.dumps({'chat_id': chat_id, 'text': msg}).encode()
              req = urllib.request.Request(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  data=data,
                  headers={'Content-Type': 'application/json'}
              )
              try:
                  urllib.request.urlopen(req, timeout=10)
                  print('Failure notification sent to Telegram')
              except Exception as e:
                  print(f'Could not send Telegram notification: {e}')
          else:
              print('TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping notification')
          PYEOF
