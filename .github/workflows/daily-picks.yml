name: Daily Betting Picks

on:
  schedule:
    # Scheduled at 08:30 UTC to account for GitHub Actions queue delay (~30 min).
    # Target execution time: ~11:00 Kyiv/Helsinki (UTC+2)
    - cron: '30 08 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  daily-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome (stable)
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          google-chrome --version

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Restore database and models
        uses: actions/cache@v4
        with:
          path: |
            data/football_betting.db
            data/models/
            data/historical_load_cache.json
          key: betting-data-${{ github.run_number }}
          restore-keys: |
            betting-data-

      - name: Create directories
        run: mkdir -p data/models logs

      - name: Create config from example
        run: cp config/config.example.yaml config/config.yaml

      - name: Verify and recover database
        run: |
          python << 'PYEOF'
          import sqlite3, os
          db = 'data/football_betting.db'
          cache_file = 'data/historical_load_cache.json'

          def reset_cache(reason):
              if os.path.exists(cache_file):
                  os.remove(cache_file)
                  print(f'Reset historical_load_cache.json ({reason}) — CSVs will be reloaded')

          def wipe_db(reason):
              for ext in ('', '-wal', '-shm'):
                  p = db + ext
                  if os.path.exists(p):
                      os.remove(p)
              print(f'Removed database: {reason}')
              reset_cache('DB wiped')

          if os.path.exists(db):
              try:
                  conn = sqlite3.connect(db, timeout=10)
                  result = conn.execute('PRAGMA integrity_check').fetchone()
                  if result[0] != 'ok':
                      conn.close()
                      wipe_db(f'integrity_check={result[0]}')
                  else:
                      # Check if DB has enough historical data to be useful
                      count = conn.execute(
                          "SELECT COUNT(*) FROM matches WHERE home_goals IS NOT NULL"
                      ).fetchone()[0]
                      picks = conn.execute(
                          "SELECT COUNT(*) FROM saved_picks"
                      ).fetchone()[0]
                      conn.close()
                      print(f'Database OK: {count} completed matches, {picks} saved picks')
                      if count < 500:
                          print(f'WARNING: only {count} completed matches — resetting CSV cache to force reload')
                          reset_cache(f'only {count} matches in DB')
              except Exception as e:
                  wipe_db(str(e))
          else:
              print('No database file — fresh start')
              reset_cache('fresh start')
          PYEOF

      - name: Initialize database
        run: python -c "from src.data.database import init_db; init_db()"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: true

      - name: Settle yesterday's predictions
        run: python -m src.agent.betting_agent --settle
        continue-on-error: true

      - name: Run daily update
        run: python -m src.agent.betting_agent --update
        continue-on-error: true

      - name: Check DB health before training
        run: |
          python << 'PYEOF'
          import sqlite3
          db = 'data/football_betting.db'
          try:
              conn = sqlite3.connect(db)
              completed = conn.execute("SELECT COUNT(*) FROM matches WHERE home_goals IS NOT NULL").fetchone()[0]
              fixtures  = conn.execute("SELECT COUNT(*) FROM matches WHERE is_fixture = 1").fetchone()[0]
              picks     = conn.execute("SELECT COUNT(*) FROM saved_picks").fetchone()[0]
              pending   = conn.execute("SELECT COUNT(*) FROM saved_picks WHERE result IS NULL").fetchone()[0]
              conn.close()
              print(f'DB health: {completed} completed matches | {fixtures} fixtures | {picks} total picks ({pending} pending settlement)')
              if completed < 100:
                  print('WARNING: fewer than 100 completed matches — ML training will be skipped')
          except Exception as e:
              print(f'DB health check failed: {e}')
          PYEOF

      - name: Train ML models on settled data
        run: python -m src.agent.betting_agent --train
        continue-on-error: true

      - name: Generate and send picks
        run: python -m src.agent.betting_agent --picks

      - name: Checkpoint SQLite WAL before save
        if: always()
        run: |
          python << 'PYEOF'
          import sqlite3, os
          db = 'data/football_betting.db'
          if os.path.exists(db):
              try:
                  # isolation_level=None = autocommit; needed for PRAGMA wal_checkpoint
                  conn = sqlite3.connect(db, timeout=30, isolation_level=None)
                  conn.execute('PRAGMA wal_checkpoint(FULL)')
                  conn.execute('PRAGMA wal_checkpoint(TRUNCATE)')
                  # Count what we're saving for visibility
                  completed = conn.execute("SELECT COUNT(*) FROM matches WHERE home_goals IS NOT NULL").fetchone()[0]
                  picks     = conn.execute("SELECT COUNT(*) FROM saved_picks").fetchone()[0]
                  conn.close()
                  print(f'WAL checkpoint OK — saving DB with {completed} completed matches, {picks} picks')
              except Exception as e:
                  print(f'WAL checkpoint error: {e}')
          else:
              print('No DB file found, skipping checkpoint')
          PYEOF

      - name: Save database and models
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/football_betting.db
            data/models/
            data/historical_load_cache.json
          key: betting-data-${{ github.run_number }}

      - name: Export database and models for local sync
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: betting-db-latest
          path: |
            data/football_betting.db
            data/models/
          retention-days: 7
          overwrite: true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7
