name: Daily Betting Picks

on:
  schedule:
    # Scheduled at 06:30 UTC → ~09:30 Kyiv summer (UTC+3) / ~08:30 Kyiv winter (UTC+2)
    - cron: '30 06 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  daily-picks:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
      FOOTBALL_DATA_ORG_KEY: ${{ secrets.FOOTBALL_DATA_ORG_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Restore DB first — before any step that can fail (camoufox fetch, Chrome
      # install, pip install, etc.).  If a later step fails and the job is saved
      # with if:always(), it re-saves the properly restored DB instead of an empty one.
      # This prevents "poison cache" where a broken run saves an empty DB and causes
      # all subsequent runs to find 0 picks at settle time.
      - name: Restore database and models
        uses: actions/cache/restore@v4
        with:
          path: |
            data/football_betting.db
            data/models/
            data/historical_load_cache.json
          key: betting-data-${{ github.run_number }}
          restore-keys: |
            betting-data-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Chrome (stable) and Xvfb
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb xvfb
          google-chrome --version

      - name: Start virtual display (Xvfb)
        run: |
          # Run Chrome in headed mode on a virtual framebuffer — Cloudflare detects
          # headless Chrome markers much more reliably than headed Chrome. Xvfb
          # provides a real display so Chrome behaves identically to a desktop browser.
          Xvfb :99 -screen 0 1920x1080x24 -ac 2>/dev/null &
          echo "DISPLAY=:99" >> $GITHUB_ENV
          sleep 1
          echo "Virtual display started on :99"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          python -c "import nltk; nltk.download('vader_lexicon', quiet=True)"

      - name: Download camoufox Firefox binary
        run: python -m camoufox fetch

      - name: Create directories
        run: mkdir -p data/models logs

      - name: Create config from example
        run: cp config/config.example.yaml config/config.yaml

      - name: Verify and recover database
        run: |
          python << 'PYEOF'
          import sqlite3, os
          db = 'data/football_betting.db'
          cache_file = 'data/historical_load_cache.json'

          def reset_cache(reason):
              if os.path.exists(cache_file):
                  os.remove(cache_file)
                  print(f'Reset historical_load_cache.json ({reason}) — CSVs will be reloaded')

          def wipe_db(reason):
              for ext in ('', '-wal', '-shm'):
                  p = db + ext
                  if os.path.exists(p):
                      os.remove(p)
              print(f'Removed database: {reason}')
              reset_cache('DB wiped')

          if os.path.exists(db):
              try:
                  conn = sqlite3.connect(db, timeout=10)
                  result = conn.execute('PRAGMA integrity_check').fetchone()
                  if result[0] != 'ok':
                      conn.close()
                      wipe_db(f'integrity_check={result[0]}')
                  else:
                      # Check if DB has enough historical data to be useful
                      count = conn.execute(
                          "SELECT COUNT(*) FROM matches WHERE home_goals IS NOT NULL"
                      ).fetchone()[0]
                      picks = conn.execute(
                          "SELECT COUNT(*) FROM saved_picks"
                      ).fetchone()[0]
                      conn.close()
                      print(f'Database OK: {count} completed matches, {picks} saved picks')
                      if count < 500:
                          print(f'WARNING: only {count} completed matches — resetting CSV cache to force reload')
                          reset_cache(f'only {count} matches in DB')
              except Exception as e:
                  wipe_db(str(e))
          else:
              print('No database file — fresh start')
              reset_cache('fresh start')
          PYEOF

      - name: Initialize database
        run: python -c "from src.data.database import init_db; init_db()"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short
        continue-on-error: true

      - name: Sync local DB picks (if available)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check for a local-db-sync release — contains a DB with locally-generated
          # picks that need to be merged before settlement.
          if gh release view local-db-sync >/dev/null 2>&1; then
            echo "Found local-db-sync release — downloading DB..."
            gh release download local-db-sync -p 'football_betting.db' -D /tmp/local-sync --clobber
            # Merge local picks into the CI DB (don't overwrite — the CI DB may have
            # fresher match results).  Copy only saved_picks rows that don't exist yet.
            python << 'PYEOF'
          import sqlite3, os, shutil
          local_db = '/tmp/local-sync/football_betting.db'
          ci_db = 'data/football_betting.db'
          if not os.path.exists(local_db):
              print('Downloaded DB not found — skipping')
              exit(0)
          if not os.path.exists(ci_db):
              # No CI DB yet — just use the local one
              shutil.copy2(local_db, ci_db)
              print('No CI DB — using local DB directly')
              exit(0)
          # Attach local DB and copy missing saved_picks
          conn = sqlite3.connect(ci_db, timeout=30)
          conn.execute(f"ATTACH DATABASE '{local_db}' AS local_db")
          # Count picks before
          before = conn.execute("SELECT COUNT(*) FROM saved_picks").fetchone()[0]
          # Insert picks that don't exist in CI DB (match by match_id + market + selection)
          conn.execute("""
              INSERT OR IGNORE INTO saved_picks
                  (match_id, market, selection, odds, predicted_probability,
                   expected_value, kelly_stake, model_agreement, reasoning,
                   timestamp, result, actual_outcome, profit_loss)
              SELECT match_id, market, selection, odds, predicted_probability,
                     expected_value, kelly_stake, model_agreement, reasoning,
                     timestamp, result, actual_outcome, profit_loss
              FROM local_db.saved_picks lp
              WHERE NOT EXISTS (
                  SELECT 1 FROM saved_picks sp
                  WHERE sp.match_id = lp.match_id
                    AND sp.market = lp.market
                    AND sp.selection = lp.selection
              )
          """)
          conn.commit()
          after = conn.execute("SELECT COUNT(*) FROM saved_picks").fetchone()[0]
          conn.execute("DETACH DATABASE local_db")
          conn.close()
          merged = after - before
          print(f'Merged {merged} new picks from local DB (total: {after})')
          PYEOF
            # Delete the release so it's not re-applied on subsequent runs
            gh release delete local-db-sync --yes --cleanup-tag 2>/dev/null || true
            echo "local-db-sync release consumed and deleted"
          else
            echo "No local-db-sync release found — skipping"
          fi
        continue-on-error: true

      - name: Settle yesterday's predictions
        run: python -m src.agent.betting_agent --settle
        continue-on-error: true

      - name: Run daily update
        run: python -m src.agent.betting_agent --update
        continue-on-error: true

      - name: Check DB health before training
        run: |
          python << 'PYEOF'
          import sqlite3
          db = 'data/football_betting.db'
          try:
              conn = sqlite3.connect(db)
              completed = conn.execute("SELECT COUNT(*) FROM matches WHERE home_goals IS NOT NULL").fetchone()[0]
              fixtures  = conn.execute("SELECT COUNT(*) FROM matches WHERE is_fixture = 1").fetchone()[0]
              picks     = conn.execute("SELECT COUNT(*) FROM saved_picks").fetchone()[0]
              pending   = conn.execute("SELECT COUNT(*) FROM saved_picks WHERE result IS NULL").fetchone()[0]
              conn.close()
              print(f'DB health: {completed} completed matches | {fixtures} fixtures | {picks} total picks ({pending} pending settlement)')
              if completed < 100:
                  print('WARNING: fewer than 100 completed matches — ML training will be skipped')
          except Exception as e:
              print(f'DB health check failed: {e}')
          PYEOF

      - name: Train ML models on settled data
        run: python -m src.agent.betting_agent --train
        continue-on-error: true

      - name: Generate and send picks
        run: python -m src.agent.betting_agent --picks

      - name: Send weekly performance report (Sundays only)
        if: success()
        run: |
          if [ "$(date +%w)" = "0" ]; then
            echo "Sunday — sending weekly performance report"
            python -m src.agent.betting_agent --report
          else
            echo "Not Sunday (day=$(date +%w)) — skipping weekly report"
          fi
        continue-on-error: true

      - name: Checkpoint SQLite WAL before save
        if: always()
        run: |
          python << 'PYEOF'
          import sqlite3, os
          db = 'data/football_betting.db'
          if os.path.exists(db):
              try:
                  # isolation_level=None = autocommit; needed for PRAGMA wal_checkpoint
                  conn = sqlite3.connect(db, timeout=30, isolation_level=None)
                  conn.execute('PRAGMA wal_checkpoint(FULL)')
                  conn.execute('PRAGMA wal_checkpoint(TRUNCATE)')
                  # Count what we're saving for visibility
                  completed = conn.execute("SELECT COUNT(*) FROM matches WHERE home_goals IS NOT NULL").fetchone()[0]
                  picks     = conn.execute("SELECT COUNT(*) FROM saved_picks").fetchone()[0]
                  conn.close()
                  print(f'WAL checkpoint OK — saving DB with {completed} completed matches, {picks} picks')
              except Exception as e:
                  print(f'WAL checkpoint error: {e}')
          else:
              print('No DB file found, skipping checkpoint')
          PYEOF

      - name: Save database and models
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            data/football_betting.db
            data/models/
            data/historical_load_cache.json
          key: betting-data-${{ github.run_number }}

      - name: Export database and models for local sync
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: betting-db-latest
          path: |
            data/football_betting.db
            data/models/
          retention-days: 7
          overwrite: true

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      - name: Notify Telegram on failure
        if: failure()
        run: |
          python << 'PYEOF'
          import os, urllib.request, json
          token = os.environ.get('TELEGRAM_BOT_TOKEN', '')
          chat_id = os.environ.get('TELEGRAM_CHAT_ID', '')
          if token and chat_id:
              run_url = 'https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              msg = f'Daily picks workflow FAILED (run #${{ github.run_number }})\nLogs: {run_url}'
              data = json.dumps({'chat_id': chat_id, 'text': msg}).encode()
              req = urllib.request.Request(
                  f'https://api.telegram.org/bot{token}/sendMessage',
                  data=data,
                  headers={'Content-Type': 'application/json'}
              )
              try:
                  urllib.request.urlopen(req, timeout=10)
                  print('Failure notification sent to Telegram')
              except Exception as e:
                  print(f'Could not send Telegram notification: {e}')
          else:
              print('TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID not set — skipping notification')
          PYEOF
