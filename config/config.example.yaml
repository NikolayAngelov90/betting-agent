# Football Betting Agent Configuration
# Copy this file to config.yaml and fill in your secrets.
# In CI environments this file is used directly; secrets are injected via env vars.

scraping:
  # -------------------------------------------------------------------------
  # WC 2026 + summer club return (as of July 2026)
  # The World Cup is still active (final July 19), and the club leagues that
  # resume in early July are re-enabled: the two Nordic summer leagues and the
  # three UEFA qualifying competitions (all have first-leg/round fixtures in the
  # July 6–13 window). The rest of the club leagues stay paused (commented out)
  # until their seasons start in August — add them back here as they return.
  # -------------------------------------------------------------------------
  flashscore_leagues:
    - world/fifa-world-cup
    # Nordic summer leagues (mid-season through the summer)
    - sweden/allsvenskan
    - norway/eliteserien
    # UEFA qualifying rounds start early July
    - europe/champions-league
    - europe/europa-league
    - europe/europa-conference-league
    # 2026/27 domestic seasons as they start (verified start dates):
    - romania/liga-1            # started 2026-07-17
    - bulgaria/efbet-league     # started 2026-07-17 (user request; NB Flashscore
                                # slug is efbet-league, not parva-liga)
    # Coming next — enable on/after their first round:
    #   poland/ekstraklasa       2026-07-24
    #   switzerland/super-league 2026-07-24
    #   denmark/superliga        2026-07-26
    #   belgium/jupiler-pro-league 2026-08-07

  # Club leagues — PAUSED until their 2026/27 seasons start (~August 2026)
  # flashscore_leagues:
  #   # Top 5 Leagues
  #   - england/premier-league
  #   - spain/laliga
  #   - germany/bundesliga
  #   - italy/serie-a
  #   - france/ligue-1
  #   # Strong European Leagues
  #   - netherlands/eredivisie
  #   - portugal/primeira-liga
  #   - belgium/jupiler-pro-league
  #   - turkey/super-lig
  #   - scotland/premiership
  #   # Lower English divisions
  #   - england/championship
  #   - england/league-one
  #   - england/league-two
  #   # Second divisions & smaller European leagues
  #   - spain/laliga2
  #   - germany/2-bundesliga
  #   - italy/serie-b
  #   - france/ligue-2
  #   - austria/bundesliga
  #   - switzerland/super-league
  #   - greece/super-league
  #   - denmark/superliga
  #   - poland/ekstraklasa

  off_season_leagues: []

  # Flashscore's WC pages are Cloudflare-blocked in CI (fixtures AND results
  # time out ~90s each + alert noise). API-Football provides WC fixtures,
  # results, and odds, so Flashscore adds nothing for this competition.
  flashscore_skip_leagues:
    - world/fifa-world-cup

  flashscore_skip_fixtures_leagues: []

  # UEFA qualifying results pages time out on Flashscore in CI (Cloudflare, same
  # as the WC) — ~2.5 min wasted per league, 0 results scraped. API-Football
  # covers their results, so skip the Flashscore results scrape for them.
  flashscore_skip_results_leagues:
    - europe/champions-league
    - europe/europa-league
    - europe/europa-conference-league

  update_interval_hours: 6
  headless: true
  request_delay: 3  # seconds between requests

database:
  # Set DATABASE_URL env var for PostgreSQL (Neon), or leave unset for local SQLite
  # url: postgresql://user:pass@host/db?sslmode=require
  sqlite_path: data/football_betting.db  # fallback when DATABASE_URL is not set

models:
  ensemble_weights:
    poisson: 0.25
    xgboost: 0.35
    random_forest: 0.20
    elo: 0.20
  # Weight for blending bookmaker implied probabilities (over/under, BTTS AND
  # 1X2) with the model's own predictions. 0.60 = 60% bookmaker, 40% model.
  # Raised from 0.40 on 2026-06-15: settled-pick data (755 picks) showed the
  # model is systematically overconfident with no edge (predicted 50-55% won
  # only 39%), so its "+EV" was fictional. Leaning harder on the well-calibrated
  # market shrinks those fake edges → fewer but better-calibrated picks.
  # Set to 0.0 to disable (pure model); raise toward 1.0 to trust the market more.
  bookmaker_blend_weight: 0.60
  # Weight for blending the dedicated GoalsMLModel over/under prediction
  # with Poisson+bookmaker. 0.25 = 25% ML, 75% Poisson+bookmaker.
  # Set to 0.0 to disable. GoalsMLModel must be trained via --train first.
  goals_ml_blend_weight: 0.25
  # Ceiling above which extreme probabilities are dampened back toward the ceiling.
  # E.g. 0.90 means 98% → 92.4% (excess retained at 30%). Set to 1.0 to disable.
  extreme_confidence_ceiling: 0.90
  # Dixon-Coles correction parameter ρ for low-scoring outcomes.
  # With ρ < 0 (typical ≈ -0.13), 0-0 and 1-1 probabilities are boosted
  # while 1-0 and 0-1 are slightly reduced. Set to 0.0 to disable.
  dixon_coles_rho: -0.13
  # Time-decay half-life for Poisson strength calculations (days).
  # Older matches are down-weighted with exponential decay.
  # 180 = matches 6 months ago have half the weight of today's.
  strength_half_life_days: 180
  # Enable match-day weather features (Open-Meteo free API, no key needed).
  # Adds temperature, wind, precipitation features. Set to false to disable.
  weather_features_enabled: true
  # International goals dampening: blend Poisson goal probs toward neutral priors
  # for CL/EL/ECL matches. 0.30 = 30% prior, 70% Poisson. Set to 0.0 to disable.
  intl_goals_dampen: 0.30
  # Bayesian shrinkage: teams with < shrinkage_sample_cap total matches have their
  # Poisson attack/defense strengths regressed toward league average (1.0).
  shrinkage_sample_cap: 100
  # Minimum matches per league to estimate a per-league Dixon-Coles rho via MLE.
  # Leagues with fewer matches use the global dixon_coles_rho instead.
  dc_rho_min_matches: 50
  # Bayesian ensemble weight learning: half-life (days) for temporal decay
  # of observations. 90 = observations 3 months ago have half the weight.
  bayesian_weight_half_life_days: 90
  # Prior strength: effective pseudo-observations from config weights.
  # Higher = more data needed before per-league weights diverge from global.
  bayesian_prior_strength: 10
  # Use xG instead of raw goals for Poisson attack/defense strengths when
  # xG data is available. Falls back to raw goals for matches without xG.
  poisson_use_xg: true
  # Minimum fraction of matches with xG data required before xG-based
  # strengths are used for a team (0.35 = at least 35% of matches need xG).
  # Lowered from 0.50 to enable partial xG usage for teams with moderate coverage.
  poisson_xg_min_coverage: 0.35
  # ML model auto-retraining: retrain if models are older than N days.
  # Triggered automatically after settlement via learn_from_settled().
  ml_retrain_days: 3
  # Drawdown circuit breaker: reduces stakes during losing streaks.
  drawdown_lookback_picks: 30       # number of recent settled picks to evaluate
  drawdown_reduce_threshold: -0.10  # ROI below this starts reducing stakes
  drawdown_pause_threshold: -0.30   # ROI below this pauses all betting
  # Targeted backfill: seasons to fetch history for low-coverage teams
  # API-Football free tier supports 2022-2024 only (2025 returns plan restriction error)
  backfill_seasons: [2022, 2023, 2024]
  # Minimum matches a team needs before it's no longer considered low-coverage
  backfill_min_matches: 10
  # Max API requests for injury fetching per run (leaves room for backfill)
  max_injury_budget: 30
  retrain_interval_days: 7
  min_training_samples: 1000

betting:
  min_odds: 1.50            # Skip very short prices — too little margin for model error
  max_odds: 10.0
  min_expected_value: 0.05  # 5% minimum edge — filters noise, improves selectivity
  min_confidence: 0.55      # 55% minimum model probability — model must give >50% clear majority
  min_ev_confidence_score: 0.038  # Sliding scale: EV × confidence combined threshold
                                  # Stricter than before; prevents very-low-confidence picks
  kelly_fraction: 0.25      # Fractional Kelly — 25% of full Kelly (professional standard)
  max_stake_percentage: 4.0 # Hard cap: maximum 4% of bankroll per bet
  max_picks_per_league: 5   # Portfolio: cap exposure per league per day
  max_total_kelly_pct: 0    # Portfolio: 0 = disabled (show all picks)
  # WC mode: save a tracked pick for EVERY World Cup match even when no value
  # edge exists (highest-EV selection, staked at the Kelly minimum). National-team
  # competitions only — club leagues keep value-only discipline. Set false to
  # revert to value-bets-only for the WC too.
  wc_pick_every_match: true
  # Club fixtures: when NO selection clears the value gates but the model has
  # decent data on both teams (coverage score >= this), still save one forced
  # pick (market-blend best selection, Claude-reviewed) so well-known matchups
  # don't produce empty days. Minnows below the threshold stay no-bet.
  # 0 disables (value-only clubs). Added 2026-07-08 (7 fixtures, 0 picks day).
  club_pick_min_coverage: 0.75
  # Quality floor for club forced picks: the chosen selection's blended win
  # probability (50% model + 50% market-implied) must reach this or NO pick is
  # made for the match. Blocks coin-flips neither source believes in (a 46%-conf
  # forced pick lost 2026-07-14; that profile wins ~37% historically). 0 disables.
  club_pick_min_blend: 0.55
  # WC "very strong favourite" routs: when the favourite's win prob >= and the
  # underdog's expected goals <=, the forced pick drops BTTS / underdog markets
  # (the weak side rarely scores) and backs the favourite's Over 1.5 / Over 2.5.
  # Ordinary 60/40 games are unaffected (BTTS still allowed). Loosen/tighten here.
  wc_mismatch_fav_prob: 0.65   # favourite win probability to count as a rout
  wc_mismatch_dog_xg: 1.10     # underdog expected goals must be at/below this
  # Scale Kelly stake by model agreement level. Reduces exposure when models disagree.
  # Markets to exclude from picks. Use market_key names from value_calculator.
  # Available: home_win, draw, away_win, over_1.5, over_2.5, over_3.5,
  #   under_1.5, under_2.5, under_3.5, btts_yes, btts_no, home_over_1.5, away_over_1.5
  excluded_markets:
    - under_1.5
    - under_2.5
    - under_3.5
    - btts_no
    - over_3.5    # proven loser in settled data: 38% win, -14% ROI over 32 picks
  kelly_agreement_scale:
    unanimous: 1.0
    majority: 0.80
    split: 0.60
    unknown: 0.75

notifications:
  telegram_enabled: true
  telegram_bot_token: "YOUR_BOT_TOKEN"   # Override via TELEGRAM_BOT_TOKEN env var
  telegram_chat_id: "YOUR_CHAT_ID"       # Override via TELEGRAM_CHAT_ID env var
  send_daily_picks: true
  send_live_alerts: false
  # Send the "Daily Value Picks" Telegram summary. Briefing ARTICLES are no
  # longer posted (see briefings.send_to_telegram: false) — the picks summary is
  # the single Telegram output. Claude still reviews every pick before it is
  # sent; the summary shows the finalized (possibly switched) selection.
  suppress_picks_summary: false

# AI match briefings (Claude Opus 4.8 + server-side web search).
# Requires ANTHROPIC_API_KEY env var (GitHub secret). When unset, briefing
# commands no-op gracefully so the rest of the pipeline is unaffected.
briefings:
  enabled: true               # master switch for the Claude pick review
  # send_to_telegram: post the full briefing ARTICLE to Telegram. false = Claude
  # still researches each match and finalizes the pick (KEEP/CHANGE), but no
  # article is posted — only the daily picks summary goes out. This is the
  # "predictions only" mode: keep Claude's per-match check, drop the briefings.
  send_to_telegram: false
  language: Bulgarian         # language the briefing prose is written in (when posted)
  # backend: which Claude to use for the research + briefing.
  #   claude_code   — headless Claude Code CLI billed to the Claude Pro
  #                   subscription (CLAUDE_CODE_OAUTH_TOKEN secret). $0 extra.
  #                   Runs on Sonnet. Falls back to anthropic_api if the token
  #                   is missing but ANTHROPIC_API_KEY is set.
  #   anthropic_api — direct API (ANTHROPIC_API_KEY), Opus 4.8, per-token credits.
  # TEMPORARY (2026-07-16): pinned to anthropic_api so the pick review NEVER
  # touches the Claude Pro subscription quota (user needs the full Pro session
  # budget elsewhere for the next days). The API path prompt-caches the system
  # prompt, so per-match cost stays low (~$0.10-0.15). Flip back to claude_code
  # to return to $0 subscription billing.
  backend: anthropic_api
  # api_fallback: when the claude_code backend comes back empty (most often the
  # shared Claude Pro 5-hour session limit), retry that single briefing via the
  # Anthropic API so the match still gets covered. Requires funded ANTHROPIC_API_KEY
  # credits; if the balance is empty it simply fails gracefully (no briefing, as
  # before). Set false to never spend API credits.
  api_fallback: true
  # finalize_picks: the briefing LLM makes the FINAL call on each WC bet — it can
  # KEEP the model's pick or CHANGE to a different selection with real bookmaker
  # odds (no veto: a bet is always placed; goal = best prediction at odds > 1.50).
  # The saved pick is updated to the decision and a code-generated footer shows
  # the final tracked bet, so the message can never contradict the DB.
  finalize_picks: true
  # Claude reviews EVERY saved pick before it is sent — WC every-match picks and
  # club-league value picks alike — as part of the --picks step.

logging:
  level: INFO
  log_file: logs/betting_agent.log
  log_rotation: "1 week"

data_sources:
  apifootball_key: "YOUR_APIFOOTBALL_KEY"        # Override via API_FOOTBALL_KEY env var
  # football-data.org free API key (register at https://www.football-data.org/client/register)
  # Free tier: 9 top leagues, no daily limit, 10 calls/minute.
  # Used for fixtures + results (supplements Flashscore, frees API-Football quota for odds).
  footballdataorg_key: "YOUR_FOOTBALLDATAORG_KEY"  # Override via FOOTBALL_DATA_ORG_KEY env var
