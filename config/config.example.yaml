# Football Betting Agent Configuration
# Copy this file to config.yaml and fill in your secrets.
# In CI environments this file is used directly; secrets are injected via env vars.

scraping:
  flashscore_leagues:
    # Top 5 Leagues (first divisions only — second divisions cut for CI speed)
    - england/premier-league
    - spain/laliga
    - germany/bundesliga
    - italy/serie-a
    - france/ligue-1
    # Strong European Leagues
    - netherlands/eredivisie
    - portugal/primeira-liga
    - belgium/jupiler-pro-league
    - turkey/super-lig
    - scotland/premiership
    # European Competitions
    - europe/champions-league
    - europe/europa-league
    - europe/europa-conference-league
    # Second divisions & smaller leagues (uncomment for local runs)
    # - england/championship
    # - england/league-one
    # - england/league-two
    # - spain/laliga2
    # - germany/2-bundesliga
    # - italy/serie-b
    # - france/ligue-2
    # - austria/bundesliga
    # - switzerland/super-league
    # - greece/super-league
    # - denmark/superliga
    # - poland/ekstraklasa
    # - romania/liga-1

  update_interval_hours: 6
  headless: true
  request_delay: 3  # seconds between requests

database:
  # Set DATABASE_URL env var for PostgreSQL (Neon), or leave unset for local SQLite
  # url: postgresql://user:pass@host/db?sslmode=require
  sqlite_path: data/football_betting.db  # fallback when DATABASE_URL is not set

models:
  ensemble_weights:
    poisson: 0.25
    xgboost: 0.35
    random_forest: 0.20
    elo: 0.20
  # Weight for blending bookmaker over/under and BTTS implied probabilities
  # with Poisson-derived goal predictions. 0.40 = 40% bookmaker, 60% Poisson.
  # Set to 0.0 to disable blending (pure Poisson for goals markets).
  bookmaker_blend_weight: 0.40
  # Weight for blending the dedicated GoalsMLModel over/under prediction
  # with Poisson+bookmaker. 0.25 = 25% ML, 75% Poisson+bookmaker.
  # Set to 0.0 to disable. GoalsMLModel must be trained via --train first.
  goals_ml_blend_weight: 0.25
  # Ceiling above which extreme probabilities are dampened back toward the ceiling.
  # E.g. 0.90 means 98% → 92.4% (excess retained at 30%). Set to 1.0 to disable.
  extreme_confidence_ceiling: 0.90
  # Dixon-Coles correction parameter ρ for low-scoring outcomes.
  # With ρ < 0 (typical ≈ -0.13), 0-0 and 1-1 probabilities are boosted
  # while 1-0 and 0-1 are slightly reduced. Set to 0.0 to disable.
  dixon_coles_rho: -0.13
  # Time-decay half-life for Poisson strength calculations (days).
  # Older matches are down-weighted with exponential decay.
  # 180 = matches 6 months ago have half the weight of today's.
  strength_half_life_days: 180
  # Enable match-day weather features (Open-Meteo free API, no key needed).
  # Adds temperature, wind, precipitation features. Set to false to disable.
  weather_features_enabled: true
  # International goals dampening: blend Poisson goal probs toward neutral priors
  # for CL/EL/ECL matches. 0.30 = 30% prior, 70% Poisson. Set to 0.0 to disable.
  intl_goals_dampen: 0.30
  # Bayesian shrinkage: teams with < shrinkage_sample_cap total matches have their
  # Poisson attack/defense strengths regressed toward league average (1.0).
  shrinkage_sample_cap: 100
  # Minimum matches per league to estimate a per-league Dixon-Coles rho via MLE.
  # Leagues with fewer matches use the global dixon_coles_rho instead.
  dc_rho_min_matches: 50
  # Bayesian ensemble weight learning: half-life (days) for temporal decay
  # of observations. 90 = observations 3 months ago have half the weight.
  bayesian_weight_half_life_days: 90
  # Prior strength: effective pseudo-observations from config weights.
  # Higher = more data needed before per-league weights diverge from global.
  bayesian_prior_strength: 10
  # Use xG instead of raw goals for Poisson attack/defense strengths when
  # xG data is available. Falls back to raw goals for matches without xG.
  poisson_use_xg: true
  # Minimum fraction of matches with xG data required before xG-based
  # strengths are used for a team (0.5 = at least 50% of matches need xG).
  poisson_xg_min_coverage: 0.50
  # ML model auto-retraining: retrain if models are older than N days.
  # Triggered automatically after settlement via learn_from_settled().
  ml_retrain_days: 3
  # Drawdown circuit breaker: reduces stakes during losing streaks.
  drawdown_lookback_picks: 30       # number of recent settled picks to evaluate
  drawdown_reduce_threshold: -0.10  # ROI below this starts reducing stakes
  drawdown_pause_threshold: -0.30   # ROI below this pauses all betting
  # Targeted backfill: seasons to fetch history for low-coverage teams
  # API-Football free tier supports 2022-2024 only (2025 returns plan restriction error)
  backfill_seasons: [2022, 2023, 2024]
  # Minimum matches a team needs before it's no longer considered low-coverage
  backfill_min_matches: 10
  # Max API requests for injury fetching per run (leaves room for backfill)
  max_injury_budget: 30
  retrain_interval_days: 7
  min_training_samples: 1000

betting:
  min_odds: 1.30
  max_odds: 10.0
  min_expected_value: 0.03  # 3% minimum edge (professional standard is 2-3%)
  min_confidence: 0.58      # 58% minimum model probability; 45% allowed when EV > 10%
  kelly_fraction: 0.25      # Fractional Kelly — 25% of full Kelly (professional standard)
  max_stake_percentage: 4.0 # Hard cap: maximum 4% of bankroll per bet
  max_picks_per_league: 5   # Portfolio: cap exposure per league per day
  max_total_kelly_pct: 40.0 # Portfolio: cap total bankroll exposure per day (%)
  # Scale Kelly stake by model agreement level. Reduces exposure when models disagree.
  # Markets to exclude from picks. Use market_key names from value_calculator.
  # Available: home_win, draw, away_win, over_1.5, over_2.5, over_3.5,
  #   under_1.5, under_2.5, under_3.5, btts_yes, btts_no, home_over_1.5, away_over_1.5
  excluded_markets:
    - under_1.5
    - under_2.5
    - under_3.5
  kelly_agreement_scale:
    unanimous: 1.0
    majority: 0.80
    split: 0.60
    unknown: 0.75

notifications:
  telegram_enabled: true
  telegram_bot_token: "YOUR_BOT_TOKEN"   # Override via TELEGRAM_BOT_TOKEN env var
  telegram_chat_id: "YOUR_CHAT_ID"       # Override via TELEGRAM_CHAT_ID env var
  send_daily_picks: true
  send_live_alerts: false

logging:
  level: INFO
  log_file: logs/betting_agent.log
  log_rotation: "1 week"

data_sources:
  apifootball_key: "YOUR_APIFOOTBALL_KEY"        # Override via API_FOOTBALL_KEY env var
  # football-data.org free API key (register at https://www.football-data.org/client/register)
  # Free tier: 9 top leagues, no daily limit, 10 calls/minute.
  # Used for fixtures + results (supplements Flashscore, frees API-Football quota for odds).
  footballdataorg_key: "YOUR_FOOTBALLDATAORG_KEY"  # Override via FOOTBALL_DATA_ORG_KEY env var
